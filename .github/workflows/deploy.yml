name: Deploy Keycloak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, ks-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          cat > .env << 'EOF'
          KEYCLOAK_ADMIN=${{ secrets.KEYCLOAK_ADMIN }}
          KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          KEYCLOAK_HOSTNAME=${{ secrets.KEYCLOAK_HOSTNAME }}
          KEYCLOAK_HTTP_PORT=${{ secrets.KEYCLOAK_HTTP_PORT }}
          KEYCLOAK_HTTPS_PORT=${{ secrets.KEYCLOAK_HTTPS_PORT }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Deploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Ensure DB role exists
        run: |
          # Wait for postgres to be ready
          for i in $(seq 1 15); do
            docker exec keycloak-db pg_isready -U postgres && break
            sleep 2
          done
          # Create role if it doesn't exist
          docker exec keycloak-db psql -U postgres -tc \
            "SELECT 1 FROM pg_roles WHERE rolname='${{ secrets.POSTGRES_USER }}'" \
            | grep -q 1 \
            || docker exec keycloak-db psql -U postgres -c \
            "CREATE ROLE \"${{ secrets.POSTGRES_USER }}\" WITH LOGIN PASSWORD '${{ secrets.POSTGRES_PASSWORD }}'; \
             GRANT ALL PRIVILEGES ON DATABASE \"${{ secrets.POSTGRES_DB }}\" TO \"${{ secrets.POSTGRES_USER }}\";"
          # Restart keycloak so it can connect with the new role
          docker compose restart keycloak

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' keycloak 2>/dev/null || echo "starting")
            echo "Attempt $i: $status"
            [ "$status" = "healthy" ] && exit 0
            sleep 5
          done
          echo "Keycloak did not become healthy in time"
          docker compose logs keycloak --tail 50
          exit 1

      - name: Cleanup .env
        if: always()
        run: rm -f .env
